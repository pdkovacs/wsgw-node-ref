apiVersion: apps/v1
kind: Deployment
metadata:
  name: wsgw-e2e-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wsgw-e2e-app
  template:
    metadata:
      labels:
        app: wsgw-e2e-app
        service.type: application
    spec:
      containers:
        - name: wsgw-e2e-app
          image: bitkit/wsgw-e2e-app-node
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: debug
            - name: E2EAPP_SERVER_PORT
              value: "8080"
            - name: E2EAPP_HTTP2
              valueFrom:
                configMapKeyRef:
                  name: wsgw-e2e-app-config
                  key: HTTP2
            - name: E2EAPP_PASSWORD_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: wsgw-e2e-app-users
                  key: PASSWORD_CREDENTIALS
            # Supported values: in-memory, dynamodb, valkey.
            - name: E2EAPP_CONNECTION_TRACKING
              valueFrom:
                configMapKeyRef:
                  name: wsgw-e2e-app-config
                  key: CONNECTION_TRACKING
            # Optional endpoint for backends that need it.
            # Examples: http://dynamodb-local:8000, valkey://valkey:6379
            - name: E2EAPP_CONNECTION_TRACKING_URL
              valueFrom:
                configMapKeyRef:
                  name: wsgw-e2e-app-config
                  key: CONNECTION_TRACKING_URL
            - name: E2EAPP_WSGW_HOST
              value: "wsgw"
            - name: E2EAPP_WSGW_PORT
              value: "8080"
            - name: E2EAPP_OTLP_ENDPOINT
              value: http://alloy.monitoring.svc.cluster.local:4318
            - name: E2EAPP_OTLP_SERVICE_NAMESPACE
              value: "bitkit/wsgw"
            - name: E2EAPP_OTLP_SERVICE_NAME
              value: "e2e-app"
          resources:
            requests:
              memory: "30M"
            limits:
              memory: "500M"
---
apiVersion: v1
kind: Service
metadata:
  name: wsgw-e2e-app
  namespace: wsgw-e2e
spec:
  selector:
    app: wsgw-e2e-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
